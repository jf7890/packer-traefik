services:
  # ==========================================
  # TRAEFIK (Reverse Proxy)
  # ==========================================
  traefik:
    image: traefik:v3.6.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Fix lỗi API Docker version cũ trên Alpine
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard (Tắt khi ra production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.dashboard=false" # Tắt dashboard public
      - "--api.insecure=true"   # Chỉ bật nội bộ nếu cần debug
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=ERROR"
    networks:
      - proxy_net

  # ==========================================
  # POSTGRES (Database)
  # ==========================================
  guac-postgres:
    image: postgres:15-alpine
    container_name: guac_postgres
    restart: always
    environment:
      PGDATA: /var/lib/postgresql/data/guacamole
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guac_user
      POSTGRES_PASSWORD: 'MySuperSecretPassword123' 
    volumes:
      - "initdb:/docker-entrypoint-initdb.d:ro"
      - guac_db_data:/var/lib/postgresql/data
    networks:
      - internal_net

  # ==========================================
  # GUACD (Backend Daemon)
  # ==========================================
  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: always
    networks:
      - internal_net

  # ==========================================
  # GUACAMOLE (Frontend Web App)
  # ==========================================
  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    restart: always
    depends_on:
      - guac-postgres
      - guacd
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guac-postgres
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: guac_user
      POSTGRES_PASSWORD: 'MySuperSecretPassword123'
    networks:
      - internal_net
      - proxy_net
    volumes:
      - "initdb:/opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema:ro"
    labels:
      - "traefik.enable=true"
      
      # FIX LỖI 504: Chỉ định chính xác mạng (tên thư mục_tên mạng)
      # Lưu ý: Packer copy vào /opt/guacamole -> Tên mạng sẽ là guacamole_proxy_net
      - "traefik.docker.network=guacamole_proxy_net"
      
      # FIX LỖI ROUTING: Chỉ định port của Tomcat
      - "traefik.http.services.guac.loadbalancer.server.port=8080"

      # FIX LỖI 404: Redirect từ / vào /guacamole/
      # (Cách đơn giản nhất: Chạy thẳng trên /guacamole)
      - "traefik.http.routers.guac.rule=PathPrefix(`/`)"
      - "traefik.http.routers.guac.entrypoints=web"
      
      # Middleware thêm prefix /guacamole nếu user gõ /
      - "traefik.http.middlewares.add-guac-prefix.addprefix.prefix=/guacamole"
      - "traefik.http.routers.guac.middlewares=add-guac-prefix"

networks:
  proxy_net:
    driver: bridge
  internal_net:
    driver: bridge

volumes:
  guac_db_data:
  initdb:
