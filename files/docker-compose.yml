services:
  # --- TRAEFIK ---
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    networks:
      - proxy_net

  # --- GUACAMOLE DB ---
  guac-postgres:
    image: postgres:15-alpine
    container_name: guac_postgres
    restart: always
    environment:
      POSTGRES_USER: guac_user
      POSTGRES_PASSWORD: guac_password_change_me
      POSTGRES_DB: guacamole_db
    volumes:
      - guac_db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - internal_net

  # --- GUACD ---
  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: always
    networks:
      - internal_net

  # --- GUACAMOLE WEB ---
  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    restart: always
    depends_on:
      - guac-postgres
      - guacd
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guac-postgres
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: guac_user
      POSTGRES_PASSWORD: guac_password_change_me
    networks:
      - internal_net
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_net"
      - "traefik.http.routers.guac.rule=PathPrefix(`/`)"
      - "traefik.http.routers.guac.entrypoints=web"
      - "traefik.http.services.guac.loadbalancer.server.port=8080"

networks:
  proxy_net:
    driver: bridge
  internal_net:
    driver: bridge

volumes:
  guac_db_data:
