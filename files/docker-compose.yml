services:
  # ==========================================
  # TRAEFIK (Reverse Proxy)
  # ==========================================
  traefik:
    image: traefik:v3.6.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Fix Docker API version mismatch on Alpine
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard (disable for production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic_conf:/etc/traefik/dynamic_conf:ro
    command:
      - "--api.dashboard=false" # Disable public dashboard
      - "--api.insecure=true"   # Enable internal dashboard for debug only
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic_conf"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=ERROR"
    networks:
      - proxy_net

  # ==========================================
  # QDRANT (Vector DB)
  # ==========================================
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required. Run setup first.}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /opt/qdrant/storage:/qdrant/storage
    networks:
      - proxy_net

networks:
  proxy_net:
    driver: bridge
